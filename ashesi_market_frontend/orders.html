<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders — Ashesi Market</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .tabs { display: flex; gap: 8px; border-bottom: 2px solid var(--c-border); margin-bottom: 24px; }
        .tab-btn {
            padding: 10px 18px; background: none; border: none; font-family: var(--font-body);
            font-size: .9rem; cursor: pointer; color: var(--c-muted); border-bottom: 2px solid transparent;
            margin-bottom: -2px; transition: all .15s;
        }
        .tab-btn.active { color: var(--c-accent); border-bottom-color: var(--c-accent); font-weight: 600; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
        .order-card { padding: 20px; margin-bottom: 16px; }
        .order-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--c-border); }
        .status-pill {
            padding: 4px 12px; border-radius: 99px; font-size: .78rem; font-weight: 600; text-transform: uppercase;
        }
        .status-pending { background: #FFF4E6; color: #C77700; }
        .status-confirmed { background: #E6F4FF; color: #0066CC; }
        .status-completed { background: #E8F7F0; color: #1A6644; }
        .status-cancelled { background: #FEF0EE; color: #8B2110; }
        .order-item { padding: 10px 0; border-bottom: 1px solid var(--c-border); font-size: .88rem; }
        .order-item:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a class="brand" href="index.html">
                <span class="brand-icon">🛍</span>
                <span class="brand-text">Ashesi Market</span>
            </a>
            <form class="nav-search" onsubmit="event.preventDefault(); searchProducts();">
                <input type="text" id="search-input" placeholder="Search products, sellers…">
                <button type="submit">Search</button>
            </form>
            <div class="nav-actions">
                <a class="nav-link" href="login.html" id="nav-login">Log in</a>
                <a class="btn btn-sm" href="register.html" id="nav-register">Register</a>
                <a class="nav-link" href="cart.html" id="nav-cart" style="display: none;">
                    Cart <span class="badge" id="cart-badge" style="display: none;">0</span>
                </a>
                <a class="nav-link" href="orders.html" id="nav-orders" style="display: none;">Orders</a>
                <a class="nav-link" href="profile.html" id="nav-profile" style="display: none;">Profile</a>
                <a class="btn btn-sm" href="sell.html" id="nav-sell" style="display: none;">+ Sell</a>
                <a class="nav-link" href="#" onclick="logout(); return false;" id="nav-logout" style="display: none;">Log out</a>
            </div>
        </div>
    </nav>

    <main class="site-main">
        <div class="container">
            <div class="page-header">
                <h1 id="orders-title">Orders</h1>
                <p id="orders-subtitle">Track your purchases and sales</p>
            </div>

            <div id="alert-container"></div>

            <div class="tabs" id="orders-tabs">
                <button class="tab-btn active" onclick="switchTab('purchases')" id="tab-btn-purchases">My Purchases</button>
                <button class="tab-btn" onclick="switchTab('sales')" id="tab-btn-sales">My Sales</button>
            </div>

            <div class="tab-panel active" id="tab-purchases">
                <div class="text-center" style="padding: 40px 0;">
                    <div style="display: inline-block; width: 40px; height: 40px; border: 3px solid var(--c-border); border-top-color: var(--c-accent); border-radius: 50%; animation: spin 1s linear infinite;"></div>
                </div>
            </div>

            <div class="tab-panel" id="tab-sales">
                <div class="text-center" style="padding: 40px 0;">
                    <div style="display: inline-block; width: 40px; height: 40px; border: 3px solid var(--c-border); border-top-color: var(--c-accent); border-radius: 50%; animation: spin 1s linear infinite;"></div>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; <span id="year"></span> Ashesi Market — Ashesi University Student Marketplace</p>
        </div>
    </footer>

    <!-- Custom Confirmation Modal -->
    <div id="confirm-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center;">
        <div style="background:white;padding:24px;border-radius:12px;max-width:400px;width:90%;box-shadow:0 4px 20px rgba(0,0,0,0.15);">
            <h3 id="confirm-title" style="margin:0 0 12px 0;font-size:1.2rem;">Confirm Action</h3>
            <p id="confirm-message" style="margin:0 0 20px 0;color:#666;line-height:1.6;"></p>
            <div style="display:flex;gap:8px;justify-content:flex-end;">
                <button onclick="closeConfirmModal(false)" class="btn btn-outline">Cancel</button>
                <button onclick="closeConfirmModal(true)" class="btn btn-primary" id="confirm-ok-btn">OK</button>
            </div>
        </div>
    </div>

    <style>
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/mobile-menu.js">
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
        
        // Custom confirmation modal
        let confirmResolve = null;
        
        function showConfirmModal(message, title = 'Confirm Action', okButtonText = 'OK') {
            return new Promise((resolve) => {
                confirmResolve = resolve;
                document.getElementById('confirm-title').textContent = title;
                document.getElementById('confirm-message').textContent = message;
                document.getElementById('confirm-ok-btn').textContent = okButtonText;
                document.getElementById('confirm-modal').style.display = 'flex';
            });
        }
        
        function closeConfirmModal(result) {
            document.getElementById('confirm-modal').style.display = 'none';
            if (confirmResolve) {
                confirmResolve(result);
                confirmResolve = null;
            }
        }
        
        // Require login
        if (!isLoggedIn()) {
            window.location.href = 'login.html?redirect=orders.html';
        }

        let currentUser = null;
        let allOrders = [];

        document.addEventListener('DOMContentLoaded', async () => {
            await loadCurrentUser();
            customizeOrdersPage();
            await loadOrders();
        });

        async function loadCurrentUser() {
            try {
                currentUser = await apiGet(API_ENDPOINTS.currentUser);
            } catch (error) {
                console.error('Error loading user:', error);
            }
        }

        function customizeOrdersPage() {
            if (!currentUser) return;
            
            const ordersTitle = document.getElementById('orders-title');
            const ordersSubtitle = document.getElementById('orders-subtitle');
            const tabBtnPurchases = document.getElementById('tab-btn-purchases');
            const tabBtnSales = document.getElementById('tab-btn-sales');
            
            if (currentUser.role === 'buyer') {
                // BUYER ONLY - Hide sales tab, focus on purchases
                if (ordersTitle) ordersTitle.textContent = 'My Purchases';
                if (ordersSubtitle) ordersSubtitle.textContent = 'Track your orders and purchases';
                if (tabBtnSales) tabBtnSales.style.display = 'none';
                if (tabBtnPurchases) tabBtnPurchases.classList.add('active');
            } else if (currentUser.role === 'seller') {
                // SELLER ONLY - Hide purchases tab, focus on sales
                if (ordersTitle) ordersTitle.textContent = 'My Sales';
                if (ordersSubtitle) ordersSubtitle.textContent = 'Manage your orders and sales';
                if (tabBtnPurchases) tabBtnPurchases.style.display = 'none';
                if (tabBtnSales) {
                    tabBtnSales.classList.add('active');
                    tabBtnSales.click(); // Switch to sales tab
                }
            } else {
                // BOTH - Show both tabs
                if (ordersTitle) ordersTitle.textContent = 'Orders';
                if (ordersSubtitle) ordersSubtitle.textContent = 'Track your purchases and sales';
            }
        }

        async function loadOrders() {
            try {
                const response = await apiGet(API_ENDPOINTS.orders);
                console.log('Orders response:', response);
                
                // Handle paginated response
                if (response && typeof response === 'object') {
                    if (Array.isArray(response)) {
                        // Direct array response
                        allOrders = response;
                    } else if (response.results && Array.isArray(response.results)) {
                        // Paginated response
                        allOrders = response.results;
                    } else {
                        console.error('Unexpected response format:', response);
                        throw new Error('Invalid response format from server');
                    }
                } else {
                    throw new Error('Invalid response from server');
                }
                
                console.log('Orders loaded:', allOrders.length, 'orders');
                renderPurchases();
                renderSales();
            } catch (error) {
                console.error('Error loading orders:', error);
                console.error('Error details:', error.message, error.stack);
                document.getElementById('alert-container').innerHTML = `
                    <div class="alert alert-error">
                        <strong>Failed to load orders.</strong><br>
                        ${error.message || 'Please try again.'}<br>
                        <small>Check browser console (F12) for details.</small>
                    </div>
                `;
                
                // Show empty state in both tabs
                document.getElementById('tab-purchases').innerHTML = `
                    <div class="empty-state">
                        <div class="icon">⚠️</div>
                        <p>Unable to load orders</p>
                    </div>
                `;
                document.getElementById('tab-sales').innerHTML = `
                    <div class="empty-state">
                        <div class="icon">⚠️</div>
                        <p>Unable to load orders</p>
                    </div>
                `;
            }
        }

        function renderPurchases() {
            const container = document.getElementById('tab-purchases');
            const purchases = allOrders.filter(order => order.buyer.id === currentUser.id);

            if (purchases.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🛍</div>
                        <p>No purchases yet.</p>
                        <a href="products.html" class="btn btn-primary mt-3">Browse Products</a>
                    </div>
                `;
                return;
            }

            const html = purchases.map(order => {
                const buyerName = order.buyer.name || `${order.buyer.first_name} ${order.buyer.last_name}`;
                
                return `
                <div class="card order-card" id="order-purchase-${order.id}">
                    <div class="order-meta">
                        <div>
                            <strong>Order #${order.id}</strong>
                            <span class="text-muted" style="margin-left:10px;font-size:.82rem;">${formatDate(order.created_at)}</span>
                        </div>
                        <span class="status-pill status-${order.status}">${order.status}</span>
                    </div>
                    ${order.items.map(item => {
                        const sellerName = item.seller.name || `${item.seller.first_name} ${item.seller.last_name}`;
                        return `
                        <div class="order-item">
                            <strong>${item.product.title}</strong> · ×${item.quantity} · GH₵ ${parseFloat(item.unit_price * item.quantity).toFixed(2)}
                            <div class="text-muted" style="font-size:.8rem;">Seller: ${sellerName}</div>
                        </div>
                        `;
                    }).join('')}
                    <div class="flex justify-between" style="margin-top:12px;font-weight:600;">
                        <span>Total</span>
                        <span style="color:var(--c-accent);font-size:1.1rem;">GH₵ ${parseFloat(order.total_amount).toFixed(2)}</span>
                    </div>
                    
                    ${(order.status === 'completed' || order.status === 'cancelled') ? `
                        <div style="margin-top:16px;">
                            <button onclick="removeOrderFromPurchases(${order.id})" class="btn btn-outline btn-sm" style="color:#666;border-color:#999;">
                                🗑️ Remove Order
                            </button>
                        </div>
                    ` : ''}
                </div>
                `;
            }).join('');

            container.innerHTML = html;
        }

        function renderSales() {
            const container = document.getElementById('tab-sales');
            
            // Get all order items where current user is the seller
            const salesItems = [];
            allOrders.forEach(order => {
                order.items.forEach(item => {
                    if (item.seller.id === currentUser.id) {
                        const buyerName = order.buyer.name || `${order.buyer.first_name} ${order.buyer.last_name}`;
                        salesItems.push({
                            ...item,
                            order_id: order.id,
                            order_status: order.status,
                            order_date: order.created_at,
                            buyer_name: buyerName,
                            buyer_phone: order.buyer.phone_whatsapp
                        });
                    }
                });
            });

            if (salesItems.length === 0) {
                // Check if user can sell
                const canSell = currentUser && (currentUser.role === 'seller' || currentUser.role === 'both');
                
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📦</div>
                        <p>No sales yet.</p>
                        ${canSell ? '<a href="sell.html" class="btn btn-primary mt-3">List a Product</a>' : ''}
                    </div>
                `;
                return;
            }

            // Group by order
            const byOrder = {};
            salesItems.forEach(item => {
                if (!byOrder[item.order_id]) {
                    byOrder[item.order_id] = [];
                }
                byOrder[item.order_id].push(item);
            });

            const html = Object.entries(byOrder).map(([orderId, items]) => {
                const first = items[0];
                const total = items.reduce((sum, item) => sum + (item.unit_price * item.quantity), 0);
                const waMsg = `Hi ${first.buyer_name}! This is regarding Order #${orderId} on Ashesi Market.`;
                const waUrl = first.buyer_phone ? generateWhatsAppURL(first.buyer_phone, waMsg) : null;
                const orderStatus = first.order_status;

                return `
                    <div class="card order-card" id="order-${orderId}">
                        <div class="order-meta">
                            <div>
                                <strong>Order #${orderId}</strong>
                                <span class="text-muted" style="margin-left:10px;font-size:.82rem;">${formatDate(first.order_date)}</span>
                                <span class="text-muted" style="margin-left:10px;font-size:.82rem;">Buyer: ${first.buyer_name}</span>
                                ${first.buyer_phone ? `<span class="text-muted" style="margin-left:10px;font-size:.82rem;">📱 ${first.buyer_phone}</span>` : ''}
                            </div>
                            <span class="status-pill status-${orderStatus}" id="status-${orderId}">${orderStatus}</span>
                        </div>
                        ${items.map(item => `
                            <div class="order-item">
                                <strong>${item.product.title}</strong> · ×${item.quantity} · GH₵ ${parseFloat(item.unit_price * item.quantity).toFixed(2)}
                            </div>
                        `).join('')}
                        <div class="flex justify-between" style="margin-top:12px;font-weight:600;">
                            <span>Your Earnings</span>
                            <span style="color:var(--c-accent);font-size:1.1rem;">GH₵ ${total.toFixed(2)}</span>
                        </div>
                        
                        <div style="margin-top:16px;display:flex;gap:8px;flex-wrap:wrap;">
                            ${waUrl ? `
                                <a href="${waUrl}" target="_blank" class="btn btn-wa btn-sm">
                                    📱 WhatsApp Buyer
                                </a>
                            ` : ''}
                            
                            ${orderStatus === 'pending' ? `
                                <button onclick="updateOrderStatus(${orderId}, 'confirmed')" class="btn btn-primary btn-sm">
                                    ✓ Approve Order
                                </button>
                                <button onclick="updateOrderStatus(${orderId}, 'cancelled')" class="btn btn-outline btn-sm" style="color:#C00;border-color:#C00;">
                                    ✗ Reject Order
                                </button>
                            ` : orderStatus === 'confirmed' ? `
                                <button onclick="updateOrderStatus(${orderId}, 'completed')" class="btn btn-primary btn-sm">
                                    ✓ Mark as Completed
                                </button>
                                <button onclick="updateOrderStatus(${orderId}, 'cancelled')" class="btn btn-outline btn-sm" style="color:#C00;border-color:#C00;">
                                    ✗ Cancel Order
                                </button>
                            ` : (orderStatus === 'completed' || orderStatus === 'cancelled') ? `
                                <button onclick="removeOrder(${orderId})" class="btn btn-outline btn-sm" style="color:#666;border-color:#999;">
                                    🗑️ Remove Order
                                </button>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');

            container.innerHTML = html;
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(`tab-${tab}`).classList.add('active');
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        function generateWhatsAppURL(phone, message) {
            let cleanPhone = phone.replace(/\D/g, '');
            if (cleanPhone.length === 10 && cleanPhone[0] === '0') {
                cleanPhone = '233' + cleanPhone.substring(1);
            }
            return `https://wa.me/${cleanPhone}?text=${encodeURIComponent(message)}`;
        }

        function searchProducts() {
            const query = document.getElementById('search-input').value;
            if (query) {
                window.location.href = `products.html?q=${encodeURIComponent(query)}`;
            }
        }

        async function updateOrderStatus(orderId, newStatus) {
            try {
                const statusText = newStatus === 'confirmed' ? 'approve' : 
                                 newStatus === 'completed' ? 'complete' : 'cancel';
                
                const confirmed = await showConfirmModal(
                    `Are you sure you want to ${statusText} this order?`,
                    'Confirm Order Status Change',
                    'Yes, ' + statusText.charAt(0).toUpperCase() + statusText.slice(1)
                );
                
                if (!confirmed) return;
                
                // Update via API
                await apiPost(API_ENDPOINTS.orderUpdateStatus(orderId), { status: newStatus });
                
                // Update UI
                const statusBadge = document.getElementById(`status-${orderId}`);
                if (statusBadge) {
                    statusBadge.className = `status-pill status-${newStatus}`;
                    statusBadge.textContent = newStatus;
                }
                
                // Show success message
                document.getElementById('alert-container').innerHTML = `
                    <div class="alert alert-success">Order status updated successfully!</div>
                `;
                
                // Reload orders to update buttons
                setTimeout(() => {
                    document.getElementById('alert-container').innerHTML = '';
                    loadOrders();
                }, 1500);
                
            } catch (error) {
                console.error('Error updating order status:', error);
                document.getElementById('alert-container').innerHTML = `
                    <div class="alert alert-error">Failed to update order status: ${error.message}</div>
                `;
            }
        }

        async function removeOrder(orderId) {
            try {
                const confirmed = await showConfirmModal(
                    'Are you sure you want to remove this order? This action cannot be undone.',
                    'Remove Order',
                    'Yes, Remove'
                );
                
                if (!confirmed) return;
                
                // Delete via API
                await apiDelete(API_ENDPOINTS.orderRemove(orderId));
                
                // Remove from UI
                const orderCard = document.getElementById(`order-${orderId}`);
                if (orderCard) {
                    orderCard.style.transition = 'opacity 0.3s';
                    orderCard.style.opacity = '0';
                    setTimeout(() => {
                        orderCard.remove();
                        
                        // Check if there are any orders left
                        const container = document.getElementById('tab-sales');
                        const remainingOrders = container.querySelectorAll('.order-card');
                        if (remainingOrders.length === 0) {
                            renderSales(); // Re-render to show empty state
                        }
                    }, 300);
                }
                
                // Show success message
                document.getElementById('alert-container').innerHTML = `
                    <div class="alert alert-success">Order removed successfully!</div>
                `;
                
                setTimeout(() => {
                    document.getElementById('alert-container').innerHTML = '';
                }, 3000);
                
            } catch (error) {
                console.error('Error removing order:', error);
                document.getElementById('alert-container').innerHTML = `
                    <div class="alert alert-error">Failed to remove order: ${error.message}</div>
                `;
            }
        }

        async function removeOrderFromPurchases(orderId) {
            try {
                const confirmed = await showConfirmModal(
                    'Are you sure you want to remove this order from your purchase history? This action cannot be undone.',
                    'Remove Order',
                    'Yes, Remove'
                );
                
                if (!confirmed) return;
                
                // Delete via API
                await apiDelete(API_ENDPOINTS.orderRemove(orderId));
                
                // Remove from UI
                const orderCard = document.getElementById(`order-purchase-${orderId}`);
                if (orderCard) {
                    orderCard.style.transition = 'opacity 0.3s';
                    orderCard.style.opacity = '0';
                    setTimeout(() => {
                        orderCard.remove();
                        
                        // Check if there are any orders left
                        const container = document.getElementById('tab-purchases');
                        const remainingOrders = container.querySelectorAll('.order-card');
                        if (remainingOrders.length === 0) {
                            renderPurchases(); // Re-render to show empty state
                        }
                    }, 300);
                }
                
                // Show success message
                document.getElementById('alert-container').innerHTML = `
                    <div class="alert alert-success">Order removed from your purchase history!</div>
                `;
                
                setTimeout(() => {
                    document.getElementById('alert-container').innerHTML = '';
                }, 3000);
                
            } catch (error) {
                console.error('Error removing order:', error);
                document.getElementById('alert-container').innerHTML = `
                    <div class="alert alert-error">Failed to remove order: ${error.message}</div>
                `;
            }
        }
    </script>
</body>
</html>
