<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Test Add Product</title>
    <style>
        body { font-family: monospace; padding: 20px; }
        button { padding: 10px 20px; margin: 10px 0; }
        pre { background: #f5f5f5; padding: 15px; border-radius: 5px; overflow-x: auto; }
        .error { background: #fee; }
        .success { background: #efe; }
    </style>
</head>
<body>
    <h1>Test Add Product</h1>
    <button onclick="testAddProduct()">Test Add Product</button>
    <div id="result"></div>

    <script>
        async function testAddProduct() {
            const result = document.getElementById('result');
            result.innerHTML = '<p>Testing...</p>';
            
            try {
                // Get CSRF token
                await fetch('http://localhost:8000/api/csrf/', {
                    credentials: 'include'
                });
                
                const csrfToken = document.cookie
                    .split('; ')
                    .find(row => row.startsWith('csrftoken='))
                    ?.split('=')[1];
                
                const productData = {
                    title: 'Test Product',
                    description: 'This is a test product',
                    price: 50.00,
                    quantity: 5,
                    category_id: 1,  // Changed from 'category' to 'category_id'
                    condition: 'good',
                    location: 'Main Campus',
                    is_available: true
                };
                
                console.log('Sending:', productData);
                
                const response = await fetch('http://localhost:8000/api/products/', {
                    method: 'POST',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrfToken
                    },
                    body: JSON.stringify(productData)
                });
                
                console.log('Response status:', response.status);
                console.log('Response headers:', [...response.headers.entries()]);
                
                const responseText = await response.text();
                console.log('Response text:', responseText);
                
                let data;
                try {
                    data = JSON.parse(responseText);
                } catch (e) {
                    data = responseText;
                }
                
                if (response.ok) {
                    result.innerHTML = `
                        <h2 class="success">✅ Success!</h2>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    result.innerHTML = `
                        <h2 class="error">❌ Error ${response.status}</h2>
                        <h3>Response Data:</h3>
                        <pre class="error">${JSON.stringify(data, null, 2)}</pre>
                        <h3>Raw Response:</h3>
                        <pre class="error">${responseText}</pre>
                    `;
                }
                
            } catch (error) {
                result.innerHTML = `
                    <h2 class="error">❌ Exception</h2>
                    <pre class="error">${error.message}\n\n${error.stack}</pre>
                `;
            }
        }
    </script>
</body>
</html>
