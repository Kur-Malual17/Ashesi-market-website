<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Check</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 40px; max-width: 800px; margin: 0 auto; }
        .status { padding: 20px; margin: 20px 0; border-radius: 8px; font-size: 18px; }
        .logged-in { background: #d4edda; border: 2px solid #28a745; color: #155724; }
        .logged-out { background: #f8d7da; border: 2px solid #dc3545; color: #721c24; }
        .info { background: #d1ecf1; border: 2px solid #17a2b8; color: #0c5460; padding: 15px; margin: 20px 0; border-radius: 8px; }
        button { padding: 12px 24px; font-size: 16px; margin: 10px 5px; cursor: pointer; border: none; border-radius: 5px; }
        .btn-primary { background: #007bff; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-success { background: #28a745; color: white; }
        pre { background: #f5f5f5; padding: 15px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🔐 Login Status Check</h1>
    
    <div id="status"></div>
    
    <div>
        <button class="btn-primary" onclick="checkStatus()">🔄 Check Status</button>
        <button class="btn-danger" onclick="clearEverything()">🗑️ Clear Everything</button>
        <button class="btn-success" onclick="window.location.href='login.html'">🔑 Go to Login</button>
    </div>
    
    <div id="details"></div>

    <script>
        async function checkStatus() {
            const statusDiv = document.getElementById('status');
            const detailsDiv = document.getElementById('details');
            
            statusDiv.innerHTML = '<p>Checking...</p>';
            
            // Check for session cookie
            const cookies = document.cookie;
            const hasSessionId = cookies.includes('sessionid');
            const hasCsrfToken = cookies.includes('csrftoken');
            
            // Check localStorage
            const localUser = localStorage.getItem('user');
            
            // Try to call authenticated endpoint
            let isAuthenticated = false;
            let errorMessage = '';
            
            try {
                const response = await fetch('http://localhost:8000/api/auth/user/', {
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                if (response.ok) {
                    isAuthenticated = true;
                    const userData = await response.json();
                    
                    statusDiv.innerHTML = `
                        <div class="status logged-in">
                            <h2>✅ YOU ARE LOGGED IN!</h2>
                            <p><strong>Name:</strong> ${userData.name}</p>
                            <p><strong>Email:</strong> ${userData.email}</p>
                            <p>All pages should work now!</p>
                        </div>
                    `;
                } else {
                    const errorData = await response.json();
                    errorMessage = errorData.detail || 'Authentication failed';
                    throw new Error(errorMessage);
                }
            } catch (error) {
                statusDiv.innerHTML = `
                    <div class="status logged-out">
                        <h2>❌ YOU ARE NOT LOGGED IN</h2>
                        <p><strong>Error:</strong> ${error.message}</p>
                        <p>You need to login to use the marketplace!</p>
                    </div>
                `;
            }
            
            // Show details
            let detailsHtml = '<h3>Technical Details:</h3>';
            
            detailsHtml += '<div class="info">';
            detailsHtml += `<p><strong>Session Cookie (sessionid):</strong> ${hasSessionId ? '✅ Present' : '❌ Missing - THIS IS THE PROBLEM!'}</p>`;
            detailsHtml += `<p><strong>CSRF Token:</strong> ${hasCsrfToken ? '✅ Present' : '❌ Missing'}</p>`;
            detailsHtml += `<p><strong>LocalStorage User:</strong> ${localUser ? '✅ Present' : '❌ Missing'}</p>`;
            detailsHtml += '</div>';
            
            if (!hasSessionId) {
                detailsHtml += `
                    <div class="info" style="background: #fff3cd; border-color: #ffc107; color: #856404;">
                        <h3>⚠️ HOW TO FIX:</h3>
                        <ol style="margin: 10px 0; padding-left: 20px;">
                            <li><strong>Click "Clear Everything"</strong> button above</li>
                            <li><strong>Click "Go to Login"</strong> button</li>
                            <li><strong>Enter your email and password</strong></li>
                            <li><strong>Click "Log In"</strong></li>
                            <li><strong>Come back here and check again</strong></li>
                        </ol>
                        <p><strong>Why?</strong> The sessionid cookie is created when you login through the API. Without it, Django doesn't know who you are.</p>
                    </div>
                `;
            }
            
            detailsHtml += '<h4>All Cookies:</h4>';
            detailsHtml += `<pre>${cookies || 'No cookies found'}</pre>`;
            
            detailsDiv.innerHTML = detailsHtml;
        }
        
        function clearEverything() {
            // Clear localStorage
            localStorage.clear();
            
            // Clear all cookies
            document.cookie.split(";").forEach(function(c) { 
                document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/"); 
            });
            
            alert('✅ Cleared all data!\n\nNow click "Go to Login" and login again.');
            checkStatus();
        }
        
        // Auto-check on load
        window.onload = checkStatus;
    </script>
</body>
</html>
