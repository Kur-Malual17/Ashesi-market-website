<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Test - Ashesi Market</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #f5f5f5; }
        .test { margin: 10px 0; padding: 10px; background: white; border-radius: 5px; }
        .pass { border-left: 4px solid #4CAF50; }
        .fail { border-left: 4px solid #f44336; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Authentication Test</h1>
    <button onclick="runTests()">Run Tests</button>
    <button onclick="clearAll()">Clear All Data</button>
    <div id="results"></div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        async function runTests() {
            const results = document.getElementById('results');
            results.innerHTML = '<h2>Running tests...</h2>';
            
            const tests = [];
            
            // Test 1: Check localStorage
            const user = localStorage.getItem('user');
            tests.push({
                name: 'LocalStorage has user',
                pass: !!user,
                details: user ? 'User found in localStorage' : 'No user in localStorage'
            });
            
            // Test 2: Check cookies
            const hasCookies = document.cookie.length > 0;
            tests.push({
                name: 'Browser has cookies',
                pass: hasCookies,
                details: document.cookie || 'No cookies found'
            });
            
            // Test 3: CSRF endpoint
            try {
                const csrf = await fetch('http://localhost:8000/api/csrf/', {
                    credentials: 'include'
                });
                tests.push({
                    name: 'CSRF endpoint',
                    pass: csrf.status === 200,
                    details: `Status: ${csrf.status}`
                });
            } catch (error) {
                tests.push({
                    name: 'CSRF endpoint',
                    pass: false,
                    details: error.message
                });
            }
            
            // Test 4: Check CSRF cookie
            const csrfCookie = document.cookie.includes('csrftoken');
            tests.push({
                name: 'CSRF token cookie',
                pass: csrfCookie,
                details: csrfCookie ? 'CSRF token found' : 'No CSRF token'
            });
            
            // Test 5: Check session cookie
            const sessionCookie = document.cookie.includes('sessionid');
            tests.push({
                name: 'Session cookie',
                pass: sessionCookie,
                details: sessionCookie ? 'Session ID found' : 'No session ID - YOU NEED TO LOGIN!'
            });
            
            // Test 6: Current user endpoint
            try {
                const userResp = await fetch('http://localhost:8000/api/auth/user/', {
                    credentials: 'include'
                });
                tests.push({
                    name: 'Current user endpoint',
                    pass: userResp.status === 200,
                    details: `Status: ${userResp.status} - ${userResp.status === 403 ? 'NOT LOGGED IN!' : 'Logged in'}`
                });
            } catch (error) {
                tests.push({
                    name: 'Current user endpoint',
                    pass: false,
                    details: error.message
                });
            }
            
            // Test 7: Cart endpoint
            try {
                const cartResp = await fetch('http://localhost:8000/api/cart/', {
                    credentials: 'include'
                });
                tests.push({
                    name: 'Cart endpoint',
                    pass: cartResp.status === 200,
                    details: `Status: ${cartResp.status} - ${cartResp.status === 403 ? 'NOT LOGGED IN!' : 'Working'}`
                });
            } catch (error) {
                tests.push({
                    name: 'Cart endpoint',
                    pass: false,
                    details: error.message
                });
            }
            
            // Display results
            let html = '<h2>Test Results:</h2>';
            tests.forEach(test => {
                html += `
                    <div class="test ${test.pass ? 'pass' : 'fail'}">
                        <strong>${test.pass ? '✓' : '✗'} ${test.name}</strong><br>
                        ${test.details}
                    </div>
                `;
            });
            
            const passCount = tests.filter(t => t.pass).length;
            html += `<h3>Passed: ${passCount}/${tests.length}</h3>`;
            
            if (!sessionCookie) {
                html += `
                    <div style="background: #fff3cd; padding: 20px; margin: 20px 0; border-radius: 5px;">
                        <h3>⚠️ YOU ARE NOT LOGGED IN!</h3>
                        <p>You need to:</p>
                        <ol>
                            <li>Go to <a href="login.html">login.html</a></li>
                            <li>Enter your email and password</li>
                            <li>Click "Log In"</li>
                            <li>Come back here and run tests again</li>
                        </ol>
                    </div>
                `;
            }
            
            results.innerHTML = html;
        }
        
        function clearAll() {
            localStorage.clear();
            document.cookie.split(";").forEach(c => {
                document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/");
            });
            alert('Cleared localStorage and cookies. Refresh the page.');
            location.reload();
        }
    </script>
</body>
</html>
