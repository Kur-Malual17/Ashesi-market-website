<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile — Ashesi Market</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .profile-header {
            padding: 28px; display: flex; gap: 20px; align-items: flex-start; margin-bottom: 28px;
        }
        .profile-avatar {
            width: 80px; height: 80px; border-radius: 50%; background: var(--c-accent);
            color: #fff; display: flex; align-items: center; justify-content: center;
            font-size: 2rem; font-weight: 700; flex-shrink: 0;
        }
        .profile-name { font-size: 1.5rem; font-weight: 700; font-family: var(--font-brand); }
        .profile-meta { font-size: .88rem; color: var(--c-muted); margin-top: 4px; }
        .tabs { display: flex; gap: 8px; border-bottom: 2px solid var(--c-border); margin-bottom: 24px; }
        .tab-btn {
            padding: 10px 18px; background: none; border: none; font-family: var(--font-body);
            font-size: .9rem; cursor: pointer; color: var(--c-muted); border-bottom: 2px solid transparent;
            margin-bottom: -2px; transition: all .15s;
        }
        .tab-btn.active { color: var(--c-accent); border-bottom-color: var(--c-accent); font-weight: 600; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
        .rating-row { display: flex; align-items: center; gap: 6px; color: var(--c-star); }
        @media (max-width: 768px) {
            .profile-header { flex-direction: column; align-items: center; text-align: center; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a class="brand" href="index.html">
                <span class="brand-icon">🛍</span>
                <span class="brand-text">Ashesi Market</span>
            </a>
            <form class="nav-search" onsubmit="event.preventDefault(); searchProducts();">
                <input type="text" id="search-input" placeholder="Search products, sellers…">
                <button type="submit">Search</button>
            </form>
            <div class="nav-actions">
                <a class="nav-link" href="login.html" id="nav-login">Log in</a>
                <a class="btn btn-sm" href="register.html" id="nav-register">Register</a>
                <a class="nav-link" href="cart.html" id="nav-cart" style="display: none;">
                    Cart <span class="badge" id="cart-badge" style="display: none;">0</span>
                </a>
                <a class="nav-link" href="orders.html" id="nav-orders" style="display: none;">Orders</a>
                <a class="nav-link" href="profile.html" id="nav-profile" style="display: none;">Profile</a>
                <a class="btn btn-sm" href="sell.html" id="nav-sell" style="display: none;">+ Sell</a>
                <a class="nav-link" href="#" onclick="logout(); return false;" id="nav-logout" style="display: none;">Log out</a>
            </div>
        </div>
    </nav>

    <main class="site-main">
        <div class="container">
            <div id="alert-container"></div>

            <div class="card profile-header" id="profile-header">
                <div class="text-center" style="padding: 40px 0; width: 100%;">
                    <div style="display: inline-block; width: 40px; height: 40px; border: 3px solid var(--c-border); border-top-color: var(--c-accent); border-radius: 50%; animation: spin 1s linear infinite;"></div>
                </div>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('listings')">Listings</button>
            </div>

            <div class="tab-panel active" id="tab-listings">
                <div class="text-center" style="padding: 40px 0;">
                    <div style="display: inline-block; width: 40px; height: 40px; border: 3px solid var(--c-border); border-top-color: var(--c-accent); border-radius: 50%; animation: spin 1s linear infinite;"></div>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; <span id="year"></span> Ashesi Market — Ashesi University Student Marketplace</p>
        </div>
    </footer>

    <style>
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/mobile-menu.js">
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
        
        // Require login
        if (!isLoggedIn()) {
            window.location.href = 'login.html?redirect=profile.html';
        }

        let currentUser = null;

        document.addEventListener('DOMContentLoaded', async () => {
            await loadProfile();
        });

        async function loadProfile() {
            try {
                currentUser = await apiGet(API_ENDPOINTS.currentUser);
                renderProfile();
                await loadListings();
            } catch (error) {
                console.error('Error loading profile:', error);
                document.getElementById('alert-container').innerHTML = `
                    <div class="alert alert-error">Failed to load profile. Please try again.</div>
                `;
            }
        }

        function renderProfile() {
            const initials = currentUser.name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
            const rating = currentUser.avg_rating || 0;
            const stars = '★'.repeat(Math.floor(rating)) + '☆'.repeat(5 - Math.floor(rating));
            
            // Format role display
            const roleDisplay = {
                'buyer': 'Buyer',
                'seller': 'Seller',
                'both': 'Buyer & Seller'
            };
            
            document.getElementById('profile-header').innerHTML = `
                <div class="profile-avatar">${initials}</div>
                <div style="flex:1;">
                    <div class="profile-name">${currentUser.name}</div>
                    <div class="profile-meta">
                        ${currentUser.year_group || 'Year group not set'}
                        ${rating > 0 ? `· <span class="rating-row" style="display:inline;">${stars} ${rating.toFixed(1)} (${currentUser.review_count || 0} reviews)</span>` : ''}
                        ${currentUser.is_verified ? '· <span style="color:var(--c-success);">✓ Verified</span>' : ''}
                    </div>
                    ${currentUser.bio ? `<p style="margin-top:8px;font-size:.9rem;color:var(--c-text);">${currentUser.bio}</p>` : '<p style="margin-top:8px;font-size:.9rem;color:var(--c-muted);font-style:italic;">No bio added yet</p>'}
                    
                    <!-- Profile Details -->
                    <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--c-border);">
                        <div style="display:grid;gap:12px;">
                            <div style="display:flex;align-items:center;gap:8px;">
                                <span style="font-weight:600;min-width:140px;color:var(--c-muted);font-size:.88rem;">Email:</span>
                                <span style="font-size:.9rem;">${currentUser.email}</span>
                            </div>
                            <div style="display:flex;align-items:center;gap:8px;">
                                <span style="font-weight:600;min-width:140px;color:var(--c-muted);font-size:.88rem;">WhatsApp:</span>
                                <span style="font-size:.9rem;">${currentUser.phone_whatsapp || '<span style="color:var(--c-muted);font-style:italic;">Not provided</span>'}</span>
                            </div>
                            <div style="display:flex;align-items:center;gap:8px;">
                                <span style="font-weight:600;min-width:140px;color:var(--c-muted);font-size:.88rem;">Year Group:</span>
                                <span style="font-size:.9rem;">${currentUser.year_group || '<span style="color:var(--c-muted);font-style:italic;">Not set</span>'}</span>
                            </div>
                            <div style="display:flex;align-items:center;gap:8px;">
                                <span style="font-weight:600;min-width:140px;color:var(--c-muted);font-size:.88rem;">Role:</span>
                                <span style="font-size:.9rem;">${roleDisplay[currentUser.role] || currentUser.role}</span>
                            </div>
                        </div>
                    </div>
                    
                    <div style="margin-top:16px;">
                        <a href="profile-edit.html" class="btn btn-primary btn-sm">✏️ Edit Profile</a>
                    </div>
                </div>
            `;
        }

        async function loadListings() {
            try {
                const response = await apiGet(`${API_ENDPOINTS.products}?seller=${currentUser.id}`);
                const products = response.results || response;
                renderListings(products);
            } catch (error) {
                console.error('Error loading listings:', error);
                document.getElementById('tab-listings').innerHTML = `
                    <div class="alert alert-error">Failed to load listings.</div>
                `;
            }
        }

        function renderListings(products) {
            const container = document.getElementById('tab-listings');

            if (products.length === 0) {
                // Check if user can sell
                const canSell = currentUser && (currentUser.role === 'seller' || currentUser.role === 'both');
                
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📦</div>
                        <p>No listings yet.</p>
                        ${canSell ? '<a href="sell.html" class="btn btn-primary mt-3">List a Product</a>' : ''}
                    </div>
                `;
                return;
            }

            const html = `
                <div class="product-grid">
                    ${products.map(p => `
                        <div class="card product-card">
                            <a href="product.html?id=${p.id}" style="text-decoration:none;color:inherit;">
                                <div class="thumb">
                                    ${p.primary_image ? 
                                        `<img src="${p.primary_image}" alt="${p.title}" loading="lazy">` :
                                        '<div class="no-img">📦</div>'
                                    }
                                </div>
                                <div class="card-body">
                                    <div class="flex gap-2">
                                        <span class="pill pill-category">${p.category_name}</span>
                                    </div>
                                    <div class="card-title">${p.title}</div>
                                    ${(p.is_available === false || p.quantity === 0) ? '<span class="pill" style="background:#FEE;color:#C00;">Out of Stock</span>' : ''}
                                    <div class="card-price">GH₵ ${parseFloat(p.price).toFixed(2)}</div>
                                </div>
                            </a>
                        </div>
                    `).join('')}
                </div>
            `;

            container.innerHTML = html;
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(`tab-${tab}`).classList.add('active');
        }

        function searchProducts() {
            const query = document.getElementById('search-input').value;
            if (query) {
                window.location.href = `products.html?q=${encodeURIComponent(query)}`;
            }
        }
    </script>
</body>
</html>
