<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List a Product — Ashesi Market</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .img-preview-strip {
            display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px;
        }
        .img-preview-item {
            position: relative; width: 100px; height: 100px; border-radius: 8px;
            overflow: hidden; border: 2px solid var(--c-border);
        }
        .img-preview-item img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .img-preview-item .remove-img {
            position: absolute; top: 4px; right: 4px; width: 24px; height: 24px;
            background: rgba(0,0,0,.7); color: #fff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 1.2rem; line-height: 1;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a class="brand" href="index.html">
                <span class="brand-icon">🛍</span>
                <span class="brand-text">Ashesi Market</span>
            </a>
            <form class="nav-search" onsubmit="event.preventDefault(); searchProducts();">
                <input type="text" id="search-input" placeholder="Search products, sellers…">
                <button type="submit">Search</button>
            </form>
            <div class="nav-actions">
                <a class="nav-link" href="login.html" id="nav-login">Log in</a>
                <a class="btn btn-sm" href="register.html" id="nav-register">Register</a>
                <a class="nav-link" href="cart.html" id="nav-cart" style="display: none;">
                    Cart <span class="badge" id="cart-badge" style="display: none;">0</span>
                </a>
                <a class="nav-link" href="orders.html" id="nav-orders" style="display: none;">Orders</a>
                <a class="nav-link" href="profile.html" id="nav-profile" style="display: none;">Profile</a>
                <a class="btn btn-sm" href="sell.html" id="nav-sell" style="display: none;">+ Sell</a>
                <a class="nav-link" href="#" onclick="logout(); return false;" id="nav-logout" style="display: none;">Log out</a>
            </div>
        </div>
    </nav>

    <main class="site-main">
        <div class="container">
            <div class="card form-card form-wide">
                <div class="page-header" style="margin-bottom:24px;">
                    <h1>List a Product</h1>
                    <p>Fill in the details to post your product</p>
                </div>

                <div id="alert-container"></div>

                <form id="product-form" onsubmit="handleSubmit(event)">
                    <div class="form-group">
                        <label>Product Title <span style="color:var(--c-warn)">*</span></label>
                        <input type="text" name="title" required maxlength="200" placeholder="e.g. iPhone 13 Pro Max">
                    </div>

                    <div class="form-group">
                        <label>Description <span style="color:var(--c-warn)">*</span></label>
                        <textarea name="description" required rows="5" placeholder="Describe your product in detail..."></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Price (GH₵) <span style="color:var(--c-warn)">*</span></label>
                            <input type="number" name="price" required min="0.01" step="0.01" placeholder="0.00">
                        </div>
                        <div class="form-group">
                            <label>Quantity Available</label>
                            <input type="number" name="quantity" min="1" value="1">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Category <span style="color:var(--c-warn)">*</span></label>
                            <select name="category" required id="category-select">
                                <option value="">Select category</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Condition</label>
                            <select name="condition">
                                <option value="new">New</option>
                                <option value="like_new">Like New</option>
                                <option value="good" selected>Good</option>
                                <option value="fair">Fair</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Pickup / Location on Campus</label>
                        <input type="text" name="location" placeholder="e.g. Block C, Main Café, Library">
                    </div>

                    <div class="form-group">
                        <label>Product Images (up to 5)</label>
                        <input type="file" id="product-images" name="images" accept="image/*" multiple onchange="previewImages(event)">
                        <span class="form-hint">JPG/PNG/WebP, max 3MB each. First image is the cover.</span>
                        <div class="img-preview-strip" id="img-preview-strip"></div>
                    </div>

                    <div class="flex gap-2">
                        <button type="submit" class="btn btn-primary" id="submit-btn">Post Listing</button>
                        <a href="index.html" class="btn btn-outline">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; <span id="year"></span> Ashesi Market — Ashesi University Student Marketplace</p>
        </div>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/mobile-menu.js"></script>
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
        
        // Require login
        if (!isLoggedIn()) {
            window.location.href = 'login.html?redirect=sell.html';
        }
        
        // Check if user is allowed to sell
        const user = getCurrentUser();
        if (user && user.role === 'buyer') {
            alert('Only sellers can list products. Please update your profile to become a seller.');
            window.location.href = 'profile.html';
        }

        let selectedFiles = [];

        document.addEventListener('DOMContentLoaded', loadCategories);

        async function loadCategories() {
            try {
                const response = await apiGet(API_ENDPOINTS.categories);
                // Handle both paginated and non-paginated responses
                const categories = response.results || response;
                const select = document.getElementById('category-select');
                categories.forEach(cat => {
                    const option = document.createElement('option');
                    option.value = cat.id;
                    option.textContent = cat.name;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading categories:', error);
            }
        }

        function previewImages(event) {
            const files = Array.from(event.target.files);
            selectedFiles = files.slice(0, 5); // Max 5 images
            
            const container = document.getElementById('img-preview-strip');
            container.innerHTML = '';

            selectedFiles.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const div = document.createElement('div');
                    div.className = 'img-preview-item';
                    div.innerHTML = `
                        <img src="${e.target.result}" alt="Preview ${index + 1}">
                        <span class="remove-img" onclick="removeImage(${index})">×</span>
                    `;
                    container.appendChild(div);
                };
                reader.readAsDataURL(file);
            });
        }

        function removeImage(index) {
            selectedFiles.splice(index, 1);
            
            // Update file input
            const dt = new DataTransfer();
            selectedFiles.forEach(file => dt.items.add(file));
            document.getElementById('product-images').files = dt.files;
            
            // Re-render previews
            const event = { target: { files: selectedFiles } };
            previewImages(event);
        }

        async function handleSubmit(event) {
            event.preventDefault();
            
            const form = event.target;
            const submitBtn = document.getElementById('submit-btn');
            const alertContainer = document.getElementById('alert-container');
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Posting...';
            alertContainer.innerHTML = '';

            try {
                // Create product
                const productData = {
                    title: form.title.value.trim(),
                    description: form.description.value.trim(),
                    price: parseFloat(form.price.value),
                    quantity: parseInt(form.quantity.value),
                    category_id: parseInt(form.category.value),  // Changed from 'category' to 'category_id'
                    condition: form.condition.value,
                    location: form.location.value.trim(),
                    is_available: true
                };

                console.log('Sending product data:', productData);

                const product = await apiPost(API_ENDPOINTS.products, productData);

                console.log('Product created:', product);

                // Upload images if any
                if (selectedFiles.length > 0) {
                    // Get JWT token
                    const token = getToken();
                    
                    for (let i = 0; i < selectedFiles.length; i++) {
                        const formData = new FormData();
                        formData.append('image', selectedFiles[i]);
                        formData.append('is_primary', i === 0 ? 'true' : 'false');

                        try {
                            const response = await fetch(API_ENDPOINTS.productUploadImage(product.id), {
                                method: 'POST',
                                headers: {
                                    'Authorization': `Bearer ${token}`
                                },
                                body: formData
                            });
                            
                            if (!response.ok) {
                                const errorData = await response.json();
                                console.error('Image upload failed:', errorData);
                            } else {
                                console.log(`Image ${i + 1} uploaded successfully`);
                            }
                        } catch (imgError) {
                            console.error('Error uploading image:', imgError);
                        }
                    }
                }

                alertContainer.innerHTML = `
                    <div class="alert alert-success">Product listed successfully!</div>
                `;
                
                setTimeout(() => {
                    window.location.href = `product.html?id=${product.id}`;
                }, 1500);

            } catch (error) {
                console.error('Error creating product:', error);
                console.error('Error details:', error.message);
                alertContainer.innerHTML = `
                    <div class="alert alert-error">
                        <strong>Failed to create product:</strong><br>
                        ${error.message || 'Please check all fields and try again.'}<br>
                        <small>Check browser console (F12) for more details.</small>
                    </div>
                `;
                submitBtn.disabled = false;
                submitBtn.textContent = 'Post Listing';
            }
        }

        function searchProducts() {
            const query = document.getElementById('search-input').value;
            if (query) {
                window.location.href = `products.html?q=${encodeURIComponent(query)}`;
            }
        }
    </script>
</body>
</html>
