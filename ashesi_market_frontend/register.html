<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Ashesi Market</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a class="brand" href="index.html">
                <span class="brand-icon">🛍</span>
                <span class="brand-text">Ashesi Market</span>
            </a>
        </div>
    </nav>

    <main class="site-main">
        <div class="container">
            <div class="card form-card form-wide">
                <div class="page-header" style="margin-bottom:24px;">
                    <h1>Create Account</h1>
                    <p>Join the Ashesi student marketplace</p>
                </div>

                <div id="alert-container"></div>

                <form id="register-form">
                    <div class="form-group">
                        <label for="first_name">Full Name</label>
                        <input type="text" id="first_name" name="first_name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Ashesi Email</label>
                        <input type="email" id="email" name="email" placeholder="yourname@ashesi.edu.gh" required>
                    </div>

                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="phone_whatsapp">WhatsApp Number</label>
                            <input type="tel" id="phone_whatsapp" name="phone_whatsapp" placeholder="0244123456">
                            <span class="form-hint">Used for buyer contact button</span>
                        </div>
                        <div class="form-group">
                            <label for="year_group">Year Group</label>
                            <select id="year_group" name="year_group">
                                <option value="">Select year</option>
                                <option value="Year 1">Year 1</option>
                                <option value="Year 2">Year 2</option>
                                <option value="Year 3">Year 3</option>
                                <option value="Year 4">Year 4</option>
                                <option value="Graduate">Graduate</option>
                                <option value="Staff">Staff</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="role">I want to</label>
                        <select id="role" name="role">
                            <option value="buyer">Buy only</option>
                            <option value="seller">Sell only</option>
                            <option value="both" selected>Buy & Sell</option>
                        </select>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" minlength="8" required>
                        </div>
                        <div class="form-group">
                            <label for="confirm_password">Confirm Password</label>
                            <input type="password" id="confirm_password" name="confirm_password" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-full">
                        <span id="btn-text">Create Account</span>
                    </button>

                    <p class="text-center mt-3" style="font-size:.88rem;">
                        Already have an account? <a href="login.html">Log in</a>
                    </p>
                </form>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; <span id="year"></span> Ashesi Market — Ashesi University Student Marketplace</p>
        </div>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
        
        document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btnText = document.getElementById('btn-text');
            const alertContainer = document.getElementById('alert-container');
            
            // Validate passwords match
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            
            if (password !== confirmPassword) {
                alertContainer.innerHTML = `
                    <div class="alert alert-error">Passwords do not match</div>
                `;
                return;
            }
            
            btnText.textContent = 'Creating account...';
            alertContainer.innerHTML = '';
            
            try {
                const firstName = document.getElementById('first_name').value;
                const nameParts = firstName.trim().split(' ');
                
                const data = {
                    first_name: nameParts[0] || firstName,
                    last_name: nameParts.slice(1).join(' ') || nameParts[0],
                    email: document.getElementById('email').value,
                    username: document.getElementById('username').value,
                    phone_whatsapp: document.getElementById('phone_whatsapp').value,
                    year_group: document.getElementById('year_group').value,
                    role: document.getElementById('role').value,
                    password: password,
                    confirm_password: confirmPassword
                };
                
                const response = await apiPost(API_ENDPOINTS.register, data);
                
                // Save user data
                saveUser(response.user);
                
                // Redirect to home
                window.location.href = 'index.html';
                
            } catch (error) {
                alertContainer.innerHTML = `
                    <div class="alert alert-error">
                        ${error.message || 'Registration failed. Please try again.'}
                    </div>
                `;
                btnText.textContent = 'Create Account';
            }
        });
    </script>
</body>
</html>
